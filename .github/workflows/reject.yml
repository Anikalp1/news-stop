name: Reject Draft Article

on:
  workflow_dispatch:
    inputs:
      draft_filename:
        description: 'Draft filename to reject'
        required: false
        default: ''

jobs:
  reject:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Delete rejected draft
        run: |
          FILE="${{ github.event.inputs.draft_filename }}"
          if [ -n "$FILE" ] && [ -f "drafts/$FILE" ]; then
            rm "drafts/$FILE"
            echo "Deleted: drafts/$FILE"
          else
            # Delete the latest draft if no filename specified
            LATEST=$(ls drafts/*.md 2>/dev/null | sort | tail -1)
            if [ -n "$LATEST" ]; then
              rm "$LATEST"
              echo "Deleted: $LATEST"
            fi
          fi

      - name: Commit rejection
        run: |
          git config user.name "AI Medium Writer Bot"
          git config user.email "bot@github-actions"
          git add drafts/
          git diff --staged --quiet || git commit -m "rejected: draft removed $(date +%Y-%m-%d)"
          git push
