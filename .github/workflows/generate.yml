name: Daily Article Generation

on:
  schedule:
    # 11:30 PM IST = 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Log model configuration
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: |
          echo "=== Model Configuration ==="
          if [ -n "$OPENROUTER_API_KEY" ] && [ -n "$GROQ_API_KEY" ]; then
            echo "Provider: OpenRouter → Groq fallback"
            echo "OpenRouter model: ${OPENROUTER_MODEL:-openrouter/free}"
            echo "Groq fallback model: ${GROQ_MODEL:-llama-3.3-70b-versatile}"
          elif [ -n "$OPENROUTER_API_KEY" ]; then
            echo "Provider: OpenRouter only"
            echo "OpenRouter model: ${OPENROUTER_MODEL:-openrouter/free}"
          elif [ -n "$GROQ_API_KEY" ]; then
            echo "Provider: Groq only"
            echo "Groq model: ${GROQ_MODEL:-llama-3.3-70b-versatile}"
          else
            echo "WARNING: No API keys found — generation will fail!"
          fi
          echo "==========================="

      - name: Generate article and send review email
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          APPROVE_BASE_URL: ${{ secrets.APPROVE_BASE_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GITHUB_REPO: ${{ github.repository }}
        run: node scripts/generate.js 2>&1 || (echo "--- FAILED ---" && exit 1)

      - name: Commit draft to repository
        run: |
          git config user.name "AI Medium Writer Bot"
          git config user.email "bot@github-actions"
          git add drafts/
          git diff --staged --quiet || git commit -m "draft: add daily article $(date +%Y-%m-%d)"
          git push
